# Windows Event Log Ingestion Pipeline
# Receives events from Winlogbeat agents (Beats protocol on port 5044)
# Key Event IDs of interest for threat detection:
#   4625 - Failed logon
#   4688 - Process creation
#   4697 - Service installed
#   4720 - User account created
#   4732 - User added to privileged group
#   7045 - New service installed (System log)

input {
  beats {
    port => 5044
    tags => ["winlogbeat"]
  }
}

filter {
  if "winlogbeat" in [tags] {
    # Enrich with threat context based on Event ID
    if [winlog][event_id] {
      mutate {
        add_field => { "event_id" => "%{[winlog][event_id]}" }
      }

      # Tag high-value security events
      if [winlog][event_id] == 4625 {
        mutate { add_tag => ["failed_logon", "authentication_event"] }
      }
      if [winlog][event_id] == 4688 {
        mutate { add_tag => ["process_creation"] }
      }
      if [winlog][event_id] in ["4697", "7045"] {
        mutate { add_tag => ["service_installation", "persistence_indicator"] }
      }
      if [winlog][event_id] in ["4720", "4732"] {
        mutate { add_tag => ["privilege_escalation_indicator"] }
      }
    }

    mutate {
      add_field => { "log_source" => "windows_event" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    ssl => true
    cacert => "/usr/share/logstash/config/certs/ca/ca.crt"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "winlog-%{+YYYY.MM.dd}"
    action => "index"
    document_type => "_doc"
  }
}
