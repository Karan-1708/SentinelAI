# CICIDS-2017 Dataset Ingestion Pipeline
# Reads CSV files from /data/cicids/ and indexes into Elasticsearch
#
# Known CICIDS-2017 gotchas handled here:
#   1. All column headers have leading spaces (" Label", " Flow Duration", etc.)
#   2. "Infinity" and "-Infinity" appear in Flow Bytes/s and Flow Packets/s
#   3. Timestamp format is "dd/MM/yyyy HH:mm" (not ISO 8601)

input {
  file {
    path => "/data/cicids/*.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
    tags => ["cicids"]
  }
}

filter {
  # Parse CSV — column names match CICIDS-2017 header after stripping spaces
  csv {
    separator => ","
    skip_header => true
    columns => [
      "Destination Port", "Flow Duration", "Total Fwd Packets",
      "Total Backward Packets", "Total Length of Fwd Packets",
      "Total Length of Bwd Packets", "Fwd Packet Length Max",
      "Fwd Packet Length Min", "Fwd Packet Length Mean",
      "Fwd Packet Length Std", "Bwd Packet Length Max",
      "Bwd Packet Length Min", "Bwd Packet Length Mean",
      "Bwd Packet Length Std", "Flow Bytes/s", "Flow Packets/s",
      "Flow IAT Mean", "Flow IAT Std", "Flow IAT Max", "Flow IAT Min",
      "Fwd IAT Total", "Fwd IAT Mean", "Fwd IAT Std", "Fwd IAT Max",
      "Fwd IAT Min", "Bwd IAT Total", "Bwd IAT Mean", "Bwd IAT Std",
      "Bwd IAT Max", "Bwd IAT Min", "Fwd PSH Flags", "Bwd PSH Flags",
      "Fwd URG Flags", "Bwd URG Flags", "Fwd Header Length",
      "Bwd Header Length", "Fwd Packets/s", "Bwd Packets/s",
      "Min Packet Length", "Max Packet Length", "Packet Length Mean",
      "Packet Length Std", "Packet Length Variance", "FIN Flag Count",
      "SYN Flag Count", "RST Flag Count", "PSH Flag Count",
      "ACK Flag Count", "URG Flag Count", "CWE Flag Count",
      "ECE Flag Count", "Down/Up Ratio", "Average Packet Size",
      "Avg Fwd Segment Size", "Avg Bwd Segment Size",
      "Fwd Header Length.1", "Fwd Avg Bytes/Bulk",
      "Fwd Avg Packets/Bulk", "Fwd Avg Bulk Rate",
      "Bwd Avg Bytes/Bulk", "Bwd Avg Packets/Bulk",
      "Bwd Avg Bulk Rate", "Subflow Fwd Packets",
      "Subflow Fwd Bytes", "Subflow Bwd Packets", "Subflow Bwd Bytes",
      "Init_Win_bytes_forward", "Init_Win_bytes_backward",
      "act_data_pkt_fwd", "min_seg_size_forward",
      "Active Mean", "Active Std", "Active Max", "Active Min",
      "Idle Mean", "Idle Std", "Idle Max", "Idle Min",
      "label"
    ]
  }

  # Strip leading/trailing whitespace from the label field
  # CICIDS-2017 label column is " Label" — already mapped above, but value may have spaces
  mutate {
    strip => ["label"]
  }

  # Replace Infinity string values with null so ES can index them as null
  if [Flow Bytes/s] == "Infinity" or [Flow Bytes/s] == "-Infinity" {
    mutate { replace => { "Flow Bytes/s" => "" } }
    mutate { convert => { "Flow Bytes/s" => "float" } }
  }
  if [Flow Packets/s] == "Infinity" or [Flow Packets/s] == "-Infinity" {
    mutate { replace => { "Flow Packets/s" => "" } }
    mutate { convert => { "Flow Packets/s" => "float" } }
  }

  # Convert all numeric fields to float
  mutate {
    convert => {
      "Destination Port" => "integer"
      "Flow Duration" => "float"
      "Total Fwd Packets" => "integer"
      "Total Backward Packets" => "integer"
      "Total Length of Fwd Packets" => "float"
      "Total Length of Bwd Packets" => "float"
      "Fwd Packet Length Max" => "float"
      "Fwd Packet Length Min" => "float"
      "Fwd Packet Length Mean" => "float"
      "Fwd Packet Length Std" => "float"
      "Bwd Packet Length Max" => "float"
      "Bwd Packet Length Min" => "float"
      "Bwd Packet Length Mean" => "float"
      "Bwd Packet Length Std" => "float"
      "Flow Bytes/s" => "float"
      "Flow Packets/s" => "float"
      "Flow IAT Mean" => "float"
      "Flow IAT Std" => "float"
      "Flow IAT Max" => "float"
      "Flow IAT Min" => "float"
      "Packet Length Mean" => "float"
      "Packet Length Std" => "float"
      "Packet Length Variance" => "float"
      "FIN Flag Count" => "integer"
      "SYN Flag Count" => "integer"
      "RST Flag Count" => "integer"
      "PSH Flag Count" => "integer"
      "ACK Flag Count" => "integer"
      "URG Flag Count" => "integer"
    }
  }

  # Parse the CICIDS timestamp format: "dd/MM/yyyy HH:mm"
  date {
    match => ["Timestamp", "dd/MM/yyyy HH:mm", "ISO8601"]
    target => "@timestamp"
    timezone => "UTC"
  }

  # Drop the raw Timestamp field (now captured in @timestamp)
  mutate { remove_field => ["Timestamp", "message", "host", "log"] }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "cicids-2017-%{+YYYY.MM.dd}"
    action => "index"
  }
}
