# NetFlow v9 / IPFIX Ingestion Pipeline
# Listens on UDP 2055 (standard NetFlow collector port)

input {
  udp {
    port => 2055
    codec => netflow {
      versions => [9, 10]   # v9 = NetFlow, v10 = IPFIX
      target => "netflow"
    }
    tags => ["netflow"]
  }
}

filter {
  if "netflow" in [tags] {
    # Extract key flow fields into top-level for easier querying
    mutate {
      add_field => {
        "src_ip"       => "%{[netflow][ipv4_src_addr]}"
        "dst_ip"       => "%{[netflow][ipv4_dst_addr]}"
        "src_port"     => "%{[netflow][l4_src_port]}"
        "dst_port"     => "%{[netflow][l4_dst_port]}"
        "protocol"     => "%{[netflow][protocol]}"
        "bytes"        => "%{[netflow][in_bytes]}"
        "packets"      => "%{[netflow][in_pkts]}"
        "flow_duration_ms" => "%{[netflow][last_switched]}"
        "log_source"   => "netflow"
      }
    }

    # Flag potentially anomalous flow volumes (heuristic — model catches the rest)
    if [netflow][in_pkts] and [netflow][in_pkts] > 10000 {
      mutate { add_tag => ["high_packet_count"] }
    }
    if [netflow][in_bytes] and [netflow][in_bytes] > 104857600 {
      # > 100MB in a single flow
      mutate { add_tag => ["high_byte_count"] }
    }
  }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    ssl => true
    cacert => "/usr/share/logstash/config/certs/ca/ca.crt"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "netflow-%{+YYYY.MM.dd}"
    action => "index"
  }
}
