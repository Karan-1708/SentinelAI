# Syslog Ingestion Pipeline (RFC 3164)
# Listens on TCP 5000 and UDP 514 for syslog messages

input {
  tcp {
    port => 5000
    type => "syslog"
    tags => ["syslog", "tcp"]
  }
  udp {
    port => 514
    type => "syslog"
    tags => ["syslog", "udp"]
    # Note: Logstash container must have CAP_NET_BIND_SERVICE or run on port > 1024
    # In docker-compose, map host 514 → container 514 only if needed
  }
}

filter {
  if [type] == "syslog" {
    grok {
      match => {
        "message" => [
          # RFC 3164 with PID
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}",
          # RFC 3164 without PID
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}: %{GREEDYDATA:syslog_message}",
          # Fallback
          "%{GREEDYDATA:syslog_message}"
        ]
      }
      tag_on_failure => ["_syslog_parse_failure"]
    }

    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
      timezone => "UTC"
    }

    # Enrich: detect common attack patterns in syslog
    if [syslog_message] =~ /Failed password/ or [syslog_message] =~ /authentication failure/ {
      mutate { add_tag => ["brute_force_attempt"] }
    }
    if [syslog_message] =~ /Invalid user/ {
      mutate { add_tag => ["invalid_user"] }
    }

    mutate {
      remove_field => ["message"]
      add_field => { "log_source" => "syslog" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "syslog-raw-%{+YYYY.MM.dd}"
    action => "index"
  }
}
