worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Compression + timeouts
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 512k;

    # Log format includes X-Request-ID so browser <-> API traces line up.
    log_format sentinelai '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rid=$upstream_http_x_request_id';
    access_log /var/log/nginx/access.log sentinelai;

    upstream api        { server api:8000; }
    upstream dashboard  { server dashboard:80; }
    upstream mlflow     { server mlflow:5000; }
    upstream kibana     { server kibana:5601; }

    # ─────────────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect (except health/ACME)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — primary entry point
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate      /etc/nginx/certs/server.crt;
        ssl_certificate_key  /etc/nginx/certs/server.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;

        # ── Security headers ─────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; \
             connect-src 'self' wss: https:; \
             script-src 'self'; \
             style-src 'self' 'unsafe-inline'; \
             img-src 'self' data:; \
             font-src 'self' data:; \
             frame-ancestors 'none'; \
             base-uri 'self'; \
             object-src 'none'" always;

        # ── FastAPI backend ──────────────────────────────────────────
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600;
        }

        # MLflow and Kibana UIs are internal-only; wrap them in a basic-auth
        # gate configured out-of-band (htpasswd file mounted from docker/nginx/).
        location /mlflow/ {
            auth_basic "SentinelAI Internal";
            auth_basic_user_file /etc/nginx/htpasswd;
            proxy_pass http://mlflow/;
            proxy_set_header Host $host;
        }

        location /kibana/ {
            auth_basic "SentinelAI Internal";
            auth_basic_user_file /etc/nginx/htpasswd;
            proxy_pass http://kibana/;
            proxy_set_header Host $host;
        }

        # React dashboard — SPA fallthrough
        location / {
            proxy_pass http://dashboard/;
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
