version: "3.9"

# Development overrides:
#   - Smaller ES heap (1GB) for machines with less RAM
#   - Debug ports exposed to host
#   - Source code mounted for hot reload
#   - Nginx bypassed (API and dashboard served directly)
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d

services:
  elasticsearch:
    environment:
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"   # exposed for local curl/debugging

  logstash:
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m

  kibana:
    ports:
      - "5601:5601"   # direct access without nginx

  postgres:
    ports:
      - "5432:5432"   # exposed for local DB tools (DBeaver, psql)

  mlflow:
    ports:
      - "5000:5000"   # MLflow UI direct access

  minio:
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO console

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile.dev
    volumes:
      - ../api:/app/api          # hot reload: mount source
      - ../models:/app/models
      - ../explainability:/app/explainability
      - ../ingestion:/app/ingestion
      - model_artifacts:/models
    ports:
      - "8000:8000"   # direct access without nginx
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile.dev
    volumes:
      - ../dashboard/src:/app/src   # Vite HMR
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0

  # Disable nginx in dev — talk to api:8000 and dashboard:3000 directly
  nginx:
    profiles: ["production"]        # excluded from default dev compose
