server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers on every response served by this container.
    # Global TLS/HSTS live at the outer nginx reverse-proxy (docker/nginx/nginx.conf).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache immutable Vite assets. Anything else is served with no-cache
    # so a bad deploy can be rolled back without users seeing stale HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain application/javascript application/json text/css;
}
