# Single network — all services resolve each other by service name
networks:
  sentinelai:
    driver: bridge

volumes:
  certs:           # ELK TLS certificates (generated by setup service)
  esdata:          # Elasticsearch index data
  pgdata:          # PostgreSQL data
  mlruns:          # MLflow run metadata
  minio_data:      # MLflow artifact blobs (S3-compatible)
  model_artifacts: # Trained model files shared between trainer and API

# ─────────────────────────────────────────────────────────────────────────────
# ELK SECURITY BOOTSTRAP
# One-shot container: generates TLS certs into the `certs` volume, then exits 0.
# Elasticsearch waits via: condition: service_completed_successfully
# ─────────────────────────────────────────────────────────────────────────────
services:
  setup:
    image: elasticsearch:8.17.0
    networks: [sentinelai]
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    user: "0"
    command: >
      bash -c "
        if [ ! -f config/certs/ca/ca.crt ]; then
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip &&
          unzip config/certs/ca.zip -d config/certs
        fi &&
        if [ ! -f config/certs/elasticsearch/elasticsearch.crt ]; then
          bin/elasticsearch-certutil cert --silent --pem --name elasticsearch --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key --dns elasticsearch,localhost -out config/certs/certs.zip &&
          unzip config/certs/certs.zip -d config/certs
        fi &&
        chmod -R 755 config/certs &&
        echo 'Certificates ready.'
      "

  # ───────────────────────── ELASTICSEARCH ─────────────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    networks: [sentinelai]
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - esdata:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    environment:
      - node.name=elasticsearch
      - cluster.name=sentinelai-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -s --cacert /usr/share/elasticsearch/config/certs/ca/ca.crt
          -u "elastic:${ELASTIC_PASSWORD}"
          https://localhost:9200/_cluster/health | grep -qE '"status":"(green|yellow)"'
      interval: 10s
      timeout: 10s
      retries: 30

  # ───────────────────────── LOGSTASH ──────────────────────────────
  logstash:
    image: logstash:8.17.0
    networks: [sentinelai]
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - certs:/usr/share/logstash/config/certs
      - ./docker/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./docker/logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline
      - ./data:/data:ro
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - LOGSTASH_PASSWORD=${LOGSTASH_PASSWORD}
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "5044:5044"     # Beats input
      - "5000:5000"     # TCP syslog input
      - "2055:2055/udp" # NetFlow input

  # ───────────────────────── KIBANA ────────────────────────────────
  kibana:
    image: kibana:8.17.0
    networks: [sentinelai]
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - certs:/usr/share/kibana/config/certs
      - ./docker/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca/ca.crt
      - SERVER_NAME=kibana

  # ───────────────────────── POSTGRESQL ────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks: [sentinelai]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  # ───────────────────────── MINIO (MLflow artifact store) ─────────
  minio:
    image: minio/minio:latest
    networks: [sentinelai]
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  # Creates the MLflow artifacts bucket in MinIO on first start
  minio-setup:
    image: minio/mc:latest
    networks: [sentinelai]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing minio/mlflow-artifacts &&
        echo 'MinIO bucket ready.'
      "

  # ───────────────────────── MLFLOW ────────────────────────────────
  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    networks: [sentinelai]
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    volumes:
      - mlruns:/mlruns
    environment:
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Password never appears on the command line (which is visible via
      # `docker inspect` / `ps`). The entrypoint composes the URI inside the
      # container from POSTGRES_* env vars instead.
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    entrypoint:
      - /bin/sh
      - -c
      # `$$VAR` is emitted as literal `$VAR` in the container config, so the
      # substitution happens inside the container's shell (using env vars),
      # not in compose. Result: the password never appears in `docker inspect`
      # Config.Cmd/Config.Entrypoint.
      - >
        exec mlflow server
        --backend-store-uri "postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@postgres:5432/$$POSTGRES_DB"
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000

  # ───────────────────────── FASTAPI ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    networks: [sentinelai]
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - model_artifacts:/models:ro
      - certs:/certs:ro
    env_file: .env
    environment:
      - ELASTICSEARCH_URL=https://elasticsearch:9200
      - ES_CA_CERT=/certs/ca/ca.crt
      - APP_ENV=production
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1770
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ───────────────────────── REACT DASHBOARD ───────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    networks: [sentinelai]

  # ───────────────────────── NGINX (reverse proxy) ─────────────────
  nginx:
    image: nginx:1.27-alpine
    networks: [sentinelai]
    depends_on:
      - api
      - dashboard
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/htpasswd:/etc/nginx/htpasswd:ro
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - no-new-privileges:true
