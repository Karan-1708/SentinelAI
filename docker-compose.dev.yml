# Development overrides — run alongside the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Changes vs production:
#   - Smaller ES heap (1GB) for machines with less RAM
#   - Debug ports exposed to host (ES 9200, PG 5432, MLflow 5000, etc.)
#   - Source code mounted for hot reload (uvicorn --reload, Vite HMR)
#   - Nginx excluded (API on :8000, dashboard on :3000 directly)

services:
  elasticsearch:
    environment:
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"   # exposed for local curl/debugging

  logstash:
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m

  kibana:
    ports:
      - "5601:5601"   # direct access without nginx

  postgres:
    ports:
      - "5432:5432"   # exposed for local DB tools (DBeaver, psql)

  mlflow:
    ports:
      - "5001:5000"   # MLflow UI direct access (5000 taken by logstash syslog)

  minio:
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO console

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.dev
    volumes:
      - ./api:/app/api
      - ./models:/app/models
      - ./explainability:/app/explainability
      - ./ingestion:/app/ingestion
      - model_artifacts:/models
    ports:
      - "8000:8000"   # direct access without nginx
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    volumes:
      - ./dashboard/src:/app/src   # Vite HMR
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0

  # Disable nginx in dev — talk to api:8000 and dashboard:3000 directly
  nginx:
    profiles: ["production"]
